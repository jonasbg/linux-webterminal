## This file is overwritten at container startup by the mock API server
## with generated TLS certificates. See the actual config at runtime:
##   cat ~/.kube/config
apiVersion: v1
kind: Config
clusters:
- cluster:
    certificate-authority-data: <generated-at-startup>
    server: https://127.0.0.1:6443
  name: mock-cluster
contexts:
- context:
    cluster: mock-cluster
    namespace: default
    user: student
  name: mock
current-context: mock
users:
- name: student
  user:
    client-certificate-data: <generated-at-startup>
    client-key-data: <generated-at-startup>
