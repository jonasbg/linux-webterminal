<!DOCTYPE html>
<html>
<head>
    <title>DevSecOps Lab - Terminal</title>
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/img/apple-touch-icon.png">
    <meta property="og:title" content="DevSecOps Lab" />
    <meta property="og:description" content="Hands-on Linux, containers, Docker, and Kubernetes - right in your browser." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nhn.one" />
    <meta property="og:image" content="https://nhn.one/static/img/og_image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="DevSecOps Lab" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DevSecOps Lab" />
    <meta name="twitter:description" content="Hands-on Linux, containers, Docker, and Kubernetes - right in your browser." />
    <meta name="twitter:image" content="https://nhn.one/static/img/og_image.png" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.5.0/xterm.min.css" integrity="sha512-XpXUuzg5afNt1bsgnrOesXP70TLH8tXYYK5sK+Y0UV+YBvJn9EfRFYWy4HT3TVDfH0nl1CO0lwOxIrt2gk9qjg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.5.0/xterm.js" integrity="sha512-Gujw5GajF5is3nMoGv9X+tCMqePLL/60qvAv1LofUZTV9jK8ENbM9L+maGmOsNzuZaiuyc/fpph1KT9uR5w3CQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.js" integrity="sha512-8BHxHDLsOHx+flIrQ0DrZcea7MkHqRU5GbTHmbdzMRnAaoCIkZ97PqZcXJkKZckMMhqfoeaJE+DNUVuyoQsO3Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Add Font Awesome for tab icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --bg-color: #1a1a1a;
            --terminal-bg: #000;
            --tab-active-bg: #000;
            --tab-inactive-bg: #2a2a2a;
            --text-color: #fff;
            --border-color: #444;
            --primary-color: #4a9eff;
            --hover-color: #357abd;
            --font-mono: 'Ubuntu Mono', monospace;
            --font-ui: 'Inter', system-ui, -apple-system, sans-serif;
            --border-radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            font-family: var(--font-ui);
            color: var(--text-color);
        }

        .terminal-app {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Tab Bar */
        .tab-bar {
            display: flex;
            background-color: var(--bg-color);
            padding: 8px 8px 0 8px;
            border-bottom: 1px solid var(--border-color);
            height: 40px;
            user-select: none;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: var(--tab-inactive-bg);
            border-radius: var(--border-radius) var(--border-radius) 0 0;
            padding: 8px 16px;
            cursor: pointer;
            margin-right: 4px;
            transition: background 0.2s;
            border: 1px solid var(--border-color);
            border-bottom: none;
            white-space: nowrap;
            max-width: 180px;
        }

        .tab.active {
            background-color: var(--tab-active-bg);
            border-bottom: 1px solid var(--tab-active-bg);
            margin-bottom: -1px;
        }

        .tab:hover:not(.active) {
            background-color: #333;
        }

        .tab-name {
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tab-close {
            margin-left: 4px;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            visibility: hidden;
        }

        .tab:hover .tab-close {
            visibility: visible;
        }

        .tab-close:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .new-tab-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background-color: transparent;
            border: none;
            color: var(--text-color);
            font-size: 16px;
            cursor: pointer;
            border-radius: var(--border-radius);
            transition: background 0.2s;
        }

        .new-tab-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Terminal Container */
        .terminals-container {
            position: relative;
            flex: 1;
            background-color: var(--terminal-bg);
            overflow: hidden;
        }

        .terminal-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
        }

        .terminal-container.active {
            display: block;
        }

        /* Xterm specific styles */
        .xterm {
            padding: 10px;
            position: absolute;
            width: 100% !important;
            height: 100% !important;
        }

        .xterm-viewport {
            width: 100% !important;
            height: 100% !important;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .xterm-screen {
            width: 100% !important;
            height: 100% !important;
        }

        .xterm-scroll-area {
            visibility: hidden;
        }

        .xterm-char-measure-element {
            visibility: hidden;
        }

        /* MOTD dialog */
        .dialog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.75);
            z-index: 100;
        }

        .dialog-content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-color);
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            z-index: 101;
            color: var(--text-color);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .dialog-content h2 {
            margin: 0 0 1.5rem 0;
            font-size: 1.5rem;
            color: var(--text-color);
        }

        .dialog-body {
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .dialog-body p {
            margin: 1rem 0;
        }

        .dialog-body ul {
            margin: 0.5rem 0;
            padding-left: 1.5rem;
        }

        .dialog-body li {
            margin: 0.5rem 0;
        }

        .dialog-button {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary-color);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .dialog-button:hover {
            background: var(--hover-color);
        }

        .hidden {
            display: none;
        }

        strong {
            color: var(--primary-color);
        }


        /* Tab bar extras */
        .tab-bar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .guide-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 32px;
            padding: 0 12px;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 12px;
            font-family: var(--font-ui);
            cursor: pointer;
            transition: color 0.15s;
        }

        .guide-btn:hover { color: #f59e0b; font-weight: 600; }

        .guide-btn .chevron {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .guide-btn.active .chevron {
            transform: rotate(180deg);
        }

        /* Main layout: terminal + sidebar */
        .main-area {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .terminal-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Instructions sidebar */
        .guide-sidebar {
            width: 0;
            overflow: hidden;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            transition: width 0.2s ease;
            position: relative;
        }

        .guide-sidebar.open {
            width: 420px;
            transition: none;
        }

        .guide-sidebar.dragging {
            transition: none;
        }

        .guide-drag {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            cursor: col-resize;
            z-index: 10;
            background: transparent;
            transition: background 0.15s;
        }

        .guide-drag:hover, .guide-drag.active {
            background: rgba(74, 158, 255, 0.4);
        }

        .guide-header {
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .guide-header h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .guide-close {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 14px;
        }

        .guide-close:hover { color: var(--text-color); }

        .guide-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem;
        }

        .guide-content .loading {
            color: #666;
            font-style: italic;
        }

        /* Markdown styling for guide */
        .guide-content h1 { font-size: 1.2rem; font-weight: 700; margin: 0 0 0.75rem; color: var(--primary-color); }
        .guide-content h2 { font-size: 1rem; font-weight: 600; margin: 1.25rem 0 0.5rem; color: #ccc; }
        .guide-content h3 { font-size: 0.9rem; font-weight: 600; margin: 1rem 0 0.4rem; color: #aaa; }
        .guide-content p { color: #999; font-size: 0.85rem; line-height: 1.6; margin: 0 0 0.6rem; }
        .guide-content ul, .guide-content ol { color: #999; font-size: 0.85rem; line-height: 1.6; margin: 0 0 0.6rem; padding-left: 1.25rem; }
        .guide-content li { margin-bottom: 0.2rem; }
        .guide-content strong { color: #ccc; }
        .guide-content code {
            background: rgba(74, 158, 255, 0.1);
            color: var(--primary-color);
            padding: 0.1rem 0.35rem;
            border-radius: 3px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
        }
        .guide-content pre {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 0.6rem 0.8rem;
            margin: 0 0 0.6rem;
            overflow-x: auto;
        }
        .code-block {
            position: relative;
        }

        .guide-content pre code { background: none; color: #6f6; padding: 0; }

        .copy-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(255,255,255,0.08);
            border: none;
            color: #888;
            cursor: pointer;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 11px;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 1;
        }

        .code-block:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { color: #fff; background: rgba(255,255,255,0.15); }
        .copy-btn.copied { color: #6f6; }

        .guide-content code {
            position: relative;
        }

        .inline-copy {
            cursor: pointer;
            transition: color 0.15s;
        }

        .inline-copy:hover { color: #fff; }
        .guide-content table { width: 100%; border-collapse: collapse; margin: 0 0 0.6rem; font-size: 0.8rem; }
        .guide-content th, .guide-content td { border: 1px solid #333; padding: 0.3rem 0.5rem; text-align: left; }
        .guide-content th { background: rgba(255,255,255,0.03); color: #ccc; font-weight: 600; }
        .guide-content td { color: #999; }
        .guide-content hr { border: none; border-top: 1px solid #333; margin: 1rem 0; }
        .guide-content img { max-width: 100%; border-radius: 8px; margin: 0.5rem 0; }

        /* File tabs in guide */
        .guide-tabs {
            display: flex;
            gap: 0;
            flex-shrink: 0;
            overflow-x: auto;
            padding: 0 1rem;
        }

        .guide-tab {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            color: #888;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            font-family: var(--font-ui);
        }

        .guide-tab:hover { color: var(--text-color); }
        .guide-tab.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }
    </style>
</head>
<body>
    <div id="motd-container"></div>
    <div class="terminal-app">
        <div class="tab-bar">
            <!-- Tabs will be dynamically added here -->
            <button class="new-tab-btn" id="new-tab-btn" title="New Terminal Tab">
                <i class="fa-solid fa-plus"></i>
            </button>
            <div class="tab-bar-right">
                <button class="guide-btn" id="guide-toggle" title="Toggle instructions" onclick="toggleGuide()">
                    Guide <i class="fa-solid fa-chevron-left chevron"></i>
                </button>
            </div>
        </div>
        <div class="main-area">
            <div class="terminal-panel">
                <div class="terminals-container">
                    <!-- Terminal containers will be dynamically added here -->
                </div>
            </div>
            <div class="guide-sidebar" id="guide-sidebar">
                <div class="guide-drag" id="guide-drag"></div>
                <div class="guide-header">
                    <h3 id="guide-title">Instructions</h3>
                    <button class="guide-close" onclick="toggleGuide()"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="guide-tabs" id="guide-tabs"></div>
                <div class="guide-content" id="guide-content">
                    <p class="loading">Loading...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Fetch and display the welcome message (hidden if already dismissed this session)
        if (!sessionStorage.getItem('motd-dismissed')) {
            fetch('/static/motd.html')
                .then(response => response.text())
                .then(html => {
                    document.getElementById('motd-container').innerHTML = html;
                });
        }

        // Dismiss welcome dialog
        function dismissDialog() {
            const dialog = document.getElementById('motd-dialog');
            if (dialog) {
                dialog.classList.add('hidden');
                sessionStorage.setItem('motd-dismissed', '1');
                if (activeTerminal) {
                    activeTerminal.term.focus();
                }
            }
        }

        // Socket.IO connection
        const socket = io(window.location.origin, {
            transports: ['websocket'],
            reconnectionAttempts: 5,
            reconnectionDelay: 1000
        });

        // Global variables
        let sessionId = null;  // This is the ws_id
        let activeTerminal = null;
        let terminals = [];
        let tabCounter = 0;
        let guideOpen = false;
        let guideFiles = {};  // filename -> markdown content
        const tabBar = document.querySelector('.tab-bar');
        const terminalsContainer = document.querySelector('.terminals-container');
        const newTabBtn = document.getElementById('new-tab-btn');

        // Guide sidebar
        function toggleGuide() {
            guideOpen = !guideOpen;
            const sidebar = document.getElementById('guide-sidebar');
            sidebar.style.width = '';  // Clear any inline width from dragging
            sidebar.classList.toggle('open', guideOpen);
            document.getElementById('guide-toggle').classList.toggle('active', guideOpen);
            setTimeout(resizeAllTerminals, 250);
        }

        function loadGuide() {
            const urlParams = new URLSearchParams(window.location.search);
            const course = urlParams.get('course');
            if (!course) return Promise.resolve(false);

            return fetch(`/api/courses/${course}/files`)
                .then(r => r.ok ? r.json() : Promise.reject())
                .then(files => {
                    if (!files || files.length === 0) {
                        document.getElementById('guide-toggle').style.display = 'none';
                        return false;
                    }
                    guideFiles = {};
                    files.forEach(f => { guideFiles[f.name] = f.content; });

                    // Build tabs
                    const tabsEl = document.getElementById('guide-tabs');
                    tabsEl.innerHTML = '';
                    files.forEach((f, i) => {
                        const tab = document.createElement('button');
                        tab.className = 'guide-tab' + (i === 0 ? ' active' : '');
                        tab.textContent = f.name;
                        tab.onclick = () => showGuideFile(f.name, tab);
                        tabsEl.appendChild(tab);
                    });

                    // Show first file
                    showGuideFile(files[0].name);
                    return true;
                })
                .catch(() => {
                    document.getElementById('guide-toggle').style.display = 'none';
                    return false;
                });
        }

        function showGuideFile(name, tabEl) {
            const content = guideFiles[name];
            if (!content) return;
            const el = document.getElementById('guide-content');
            const isMarkdown = name.endsWith('.md') || name.endsWith('.markdown');
            el.innerHTML = marked.parse(isMarkdown ? content : '```\n' + content + '\n```');

            // Add copy buttons to code blocks
            el.querySelectorAll('pre').forEach(pre => {
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block';
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(pre);

                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.innerHTML = '<i class="fa-solid fa-copy"></i>';
                btn.onclick = () => {
                    const code = pre.querySelector('code');
                    navigator.clipboard.writeText(code ? code.textContent : pre.textContent);
                    btn.innerHTML = '<i class="fa-solid fa-check"></i>';
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.innerHTML = '<i class="fa-solid fa-copy"></i>';
                        btn.classList.remove('copied');
                    }, 1500);
                };
                wrapper.appendChild(btn);
            });

            // Make inline code clickable to copy
            el.querySelectorAll('code').forEach(code => {
                if (code.parentElement.tagName === 'PRE') return; // skip code blocks
                code.classList.add('inline-copy');
                code.title = 'Click to copy';
                code.onclick = () => {
                    navigator.clipboard.writeText(code.textContent);
                    const orig = code.style.color;
                    code.style.color = '#6f6';
                    setTimeout(() => { code.style.color = orig; }, 800);
                };
            });

            // Update active tab
            if (tabEl) {
                document.querySelectorAll('.guide-tab').forEach(t => t.classList.remove('active'));
                tabEl.classList.add('active');
            }

            // Scroll to top
            el.scrollTop = 0;
        }

        // Guide toggle handled via onclick attribute on the button

        // Drag to resize guide sidebar
        (function() {
            const drag = document.getElementById('guide-drag');
            const sidebar = document.getElementById('guide-sidebar');
            let dragging = false;

            drag.addEventListener('mousedown', (e) => {
                e.preventDefault();
                dragging = true;
                sidebar.classList.add('dragging');
                drag.classList.add('active');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', (e) => {
                if (!dragging) return;
                const newWidth = window.innerWidth - e.clientX;
                if (newWidth < 80) {
                    sidebar.style.width = '0px';
                } else if (newWidth >= 200 && newWidth <= 800) {
                    sidebar.style.width = newWidth + 'px';
                }
            });

            document.addEventListener('mouseup', () => {
                if (!dragging) return;
                dragging = false;
                sidebar.classList.remove('dragging');
                drag.classList.remove('active');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
                // If dragged below threshold, close
                if (parseInt(sidebar.style.width) < 80) {
                    guideOpen = false;
                    sidebar.classList.remove('open');
                    sidebar.style.width = '';
                    document.getElementById('guide-toggle').classList.remove('active');
                }
                resizeAllTerminals();
            });
        })();

        // Terminal class to manage each terminal instance
        class TerminalTab {
            constructor(id, isFirstTab = false) {
                this.id = id;
                this.tabId = `tab-${tabCounter++}`;
                this.term = null;
                this.fitAddon = null;
                this.shellId = null;
                this.isFirstTab = isFirstTab;

                this.createTerminalElements();
                this.initializeTerminal();

                if (isFirstTab) {
                } else {
                    this.createNewShell();
                }
            }

            createTerminalElements() {
                // Create tab element
                this.tabElement = document.createElement('div');
                this.tabElement.className = 'tab';
                this.tabElement.dataset.tabId = this.tabId;
                this.tabElement.innerHTML = `
                    <i class="fa-solid fa-terminal"></i>
                    <span class="tab-name">Terminal ${tabCounter}</span>
                    <span class="tab-close"><i class="fa-solid fa-xmark"></i></span>
                `;

                // Create terminal container
                this.containerElement = document.createElement('div');
                this.containerElement.className = 'terminal-container';
                this.containerElement.dataset.tabId = this.tabId;

                // Insert elements into DOM
                tabBar.insertBefore(this.tabElement, newTabBtn);
                terminalsContainer.appendChild(this.containerElement);

                // Add event listeners
                this.tabElement.addEventListener('click', (e) => {
                    if (e.target.closest('.tab-close')) {
                        this.close();
                    } else {
                        this.activate();
                    }
                });
            }

            initializeTerminal() {
                this.fitAddon = new FitAddon.FitAddon();
                this.term = new Terminal({
                    cursorBlink: true,
                    fontSize: 14,
                    fontFamily: '"Ubuntu Mono", monospace',
                    theme: {
                        background: '#000000',
                        foreground: '#ffffff'
                    },
                    convertEol: true,
                    scrollback: 1000,
                    cols: 142,
                    rows: 24,
                    cursorStyle: 'block',
                    fastScrollModifier: 'alt',
                    scrollSensitivity: 1,
                    macOptionIsMeta: true,
                    allowTransparency: false,
                    letterSpacing: 0,
                    lineHeight: 1,
                    fontLigatures: false
                });

                this.term.loadAddon(this.fitAddon);
                this.term.open(this.containerElement);

                // Handle terminal input
                this.term.onData((data) => {
                    if (sessionId) {
                        if (this.isFirstTab) {
                            // First tab uses the original socket connection
                            socket.emit('input', {
                                id: sessionId,
                                input: data
                            });
                        } else if (this.shellId) {
                            // Additional tabs use shell_input
                            socket.emit('shell_input', {
                                containerId: sessionId,
                                shellId: this.shellId,
                                input: data
                            });
                        }
                    }
                });
            }

            createNewShell() {
                if (!sessionId) {
                    this.term.write('Error: No active session\r\n');
                    return;
                }

                socket.emit('create_shell', {
                    containerId: sessionId,
                    tabId: this.tabId
                });
            }

            fitTerminal() {
                if (!this.term || !this.fitAddon) return;

                try {
                    const termRect = this.containerElement.getBoundingClientRect();
                    const width = termRect.width;
                    const height = termRect.height;
                    const fontSize = 14;

                    const cols = Math.floor(width / (fontSize * 0.5));
                    const rows = Math.floor(height / (fontSize * 1.1));

                    this.term.resize(cols, rows);
                    this.fitAddon.fit();

                    // Send resize event
                    if (this.isFirstTab) {
                        // First tab uses the original resize
                        socket.emit('resize', {
                            id: sessionId,
                            cols: cols,
                            rows: rows
                        });
                    } else if (this.shellId) {
                        // Additional tabs use resize_shell
                        socket.emit('resize_shell', {
                            containerId: sessionId,
                            shellId: this.shellId,
                            cols: cols,
                            rows: rows
                        });
                    }
                } catch (e) {
                    console.error('Error fitting terminal:', e);
                }
            }

            activate() {
                if (activeTerminal === this) return;

                // Deactivate current terminal
                if (activeTerminal) {
                    activeTerminal.tabElement.classList.remove('active');
                    activeTerminal.containerElement.classList.remove('active');
                }

                // Activate this terminal
                this.tabElement.classList.add('active');
                this.containerElement.classList.add('active');
                activeTerminal = this;

                // Focus and fit terminal
                if (this.term) {
                    this.term.focus();
                    this.fitTerminal();
                }
            }

            close() {
                // Prevent closing the last tab
                if (terminals.length <= 1) {
                    return;
                }

                // Remove from DOM
                this.tabElement.remove();
                this.containerElement.remove();

                // Clean up terminal
                if (this.term) {
                    this.term.dispose();
                }

                // Clean up shell on server (but only for additional tabs)
                if (!this.isFirstTab && this.shellId) {
                    socket.emit('close_shell', {
                        containerId: sessionId,
                        shellId: this.shellId
                    });
                }

                // Remove from terminals array
                const index = terminals.indexOf(this);
                if (index > -1) {
                    terminals.splice(index, 1);
                }

                // Activate another tab if this was active
                if (activeTerminal === this && terminals.length > 0) {
                    terminals[0].activate();
                }
            }
        }

        // Create initial terminal tab
        function createInitialTab() {
            const tab = new TerminalTab('initial', true);
            terminals.push(tab);
            tab.activate();
        }

        // Create a new terminal tab
        function createNewTab() {
            if (!sessionId) {
                return;
            }

            const tab = new TerminalTab('tab-' + Date.now());
            terminals.push(tab);
            tab.activate();
        }

        // Resize all terminals
        function resizeAllTerminals() {
            terminals.forEach(terminal => {
                terminal.fitTerminal();
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Create initial tab
            createInitialTab();

            // Load guide content, auto-open if ?guide=1 or if course has files
            loadGuide().then(hasFiles => {
                if (hasFiles) {
                    const urlParams = new URLSearchParams(window.location.search);
                    if (urlParams.get('guide') === '1') toggleGuide();
                }
            });

            // Add event listener for new tab button
            newTabBtn.addEventListener('click', createNewTab);

            // Handle window resize
            window.addEventListener('resize', () => {
                clearTimeout(window.resizeTimeout);
                window.resizeTimeout = setTimeout(resizeAllTerminals, 250);
            });

            // Cleanup on page unload
            window.addEventListener('beforeunload', () => {
                if (sessionId) {
                    socket.emit('cleanup', { id: sessionId });
                }
            });
        });

        // Socket.IO event handlers
        socket.on('connect', () => {
            // Connection established
        });

        socket.on('session_id', (data) => {
            sessionId = data.id;
            // Pass course slug from URL query param if present
            const urlParams = new URLSearchParams(window.location.search);
            const course = urlParams.get('course');
            const startData = { id: sessionId };
            if (course) startData.course = course;
            socket.emit('start_session', startData);
        });

        socket.on('container_ready', () => {
            if (activeTerminal && activeTerminal.isFirstTab) {
                setTimeout(() => {
                    activeTerminal.fitTerminal();
                }, 250);
            }
        });

        // For the first tab (original socket)
        socket.on('output', (data) => {
            // Find the first tab
            const firstTab = terminals.find(t => t.isFirstTab);
            if (firstTab && firstTab.term) {
                firstTab.term.write(data.output);
            }
        });

        // For additional tabs (shell sockets)
        socket.on('shell_created', (data) => {
            const targetTab = terminals.find(t => t.tabId === data.tabId);
            if (targetTab) {
                targetTab.shellId = data.shellId;
                targetTab.fitTerminal();
                targetTab.term.focus();
            }
        });

        socket.on('shell_output', (data) => {
            // Find which terminal this output belongs to
            const targetTerminal = terminals.find(t => t.shellId === data.shellId);
            if (targetTerminal && targetTerminal.term) {
                targetTerminal.term.write(data.output);
            }
        });

        socket.on('shell_exited', (data) => {
            const tab = terminals.find(t => t.shellId === data.shellId);
            if (tab) {
                tab.close();
            }
        });

        socket.on('error', (data) => {
            if (activeTerminal && activeTerminal.term) {
                activeTerminal.term.write('\r\nError: ' + data.error + '\r\n');
            }
        });

        // Main shell exited but other tabs still alive — close the first tab
        socket.on('main_shell_exited', () => {
            const firstTab = terminals.find(t => t.isFirstTab);
            if (firstTab) {
                firstTab.close();
            }
        });

        // All shells dead — redirect
        socket.on('session_ended', () => {
            window.location.href = '/';
        });

        socket.on('disconnect', () => {
            if (sessionId) {
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>
