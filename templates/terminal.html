<!DOCTYPE html>
<html>
<head>
    <title>Interactive Terminal</title>
    <!-- Add favicon links -->
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/img/apple-touch-icon.png">
    <!-- Add OpenGraph tags right after title -->
    <meta property="og:title" content="Web Terminal" />
    <meta property="og:description" content="An interactive web-based terminal environment" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="htts://jonas.grimsgaard.dev" /> <!-- Add your deployment URL here -->
    <meta property="og:image" content="/static/img/og_image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Web Terminal" />
    <!-- Add Twitter Card tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Web Terminal" />
    <meta name="twitter:description" content="An interactive web-based terminal environment" />
    <meta name="twitter:image" content="/static/img/og_image.png" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/xterm/3.14.5/xterm.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/3.14.5/xterm.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/3.14.5/addons/fit/fit.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0px;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
        }
        #terminal {
            width: 100vw;
            height: 90vh;
            padding: 20px;
            border-radius: 15px;
            background-color: #000;
            overflow: hidden;
            position: relative; /* Add this */
        }
        .terminal-container {
            width: 100%;
            height: 100%;
            position: relative; /* Add this */
        }
        /* Xterm specific styles */
        .xterm {
            padding: 0;
            margin: 0;
            position: absolute; /* Change to absolute */
            width: 100% !important;
            height: 100% !important;
        }
        .xterm-viewport {
            width: 100% !important;
            height: 100% !important;
            overflow-y: auto;
            overflow-x: hidden; /* Add this */
        }
        .xterm-screen {
            width: 100% !important;
            height: 100% !important;
            position: relative; /* Add this */
        }
        /* Add these new styles */
        .xterm-scroll-area {
            visibility: hidden;
        }
        .xterm-char-measure-element {
            visibility: hidden;
        }
    </style>
</head>
<body>
    <div id="motd-container"></div>
    <div id="terminal"></div>

    <script>

        function dismissDialog() {
            const dialog = document.getElementById('motd-dialog');
            if (dialog) {
                dialog.classList.add('hidden');
                // Focus the terminal
                if (term) {  // 'term' is your terminal instance
                    term.focus();
                }
            }
        }

        fetch('/static/motd.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('motd-container').innerHTML = html;
            });

        Terminal.applyAddon(fit);

        const term = new Terminal({
            cursorBlink: true,
            fontSize: 14,
            fontFamily: 'Menlo, Monaco, "Courier New", monospace',
            theme: {
                background: '#000000',
                foreground: '#ffffff'
            },
            convertEol: true,
            scrollback: 1000,
            cols: 80,
            rows: 24,
            // Add these new options
            cursorStyle: 'block',
            fastScrollModifier: 'alt',
            scrollSensitivity: 1,
            macOptionIsMeta: true,
            allowTransparency: false,
            letterSpacing: 0,
            lineHeight: 1
        });

        function fitTerminal() {
            const terminal = document.getElementById('terminal');
            const computedStyle = window.getComputedStyle(terminal);
            const width = parseInt(computedStyle.getPropertyValue('width'));
            const height = parseInt(computedStyle.getPropertyValue('height'));
            const fontSize = 14;

            // Calculate approximate columns and rows based on container size
            const cols = Math.floor(width / (fontSize * 0.6));
            const rows = Math.floor(height / (fontSize * 1.2));

            term.resize(cols, rows);
            term.fit();
        }

        term.open(document.getElementById('terminal'));
        fitTerminal();

        window.addEventListener('resize', () => {
            clearTimeout(window.resizeTimeout);
            window.resizeTimeout = setTimeout(fitTerminal, 250);
        });

        const socket = io(window.location.origin, {
            transports: ['websocket'],
            reconnectionAttempts: 5,
            reconnectionDelay: 1000
        });

        let sessionId = null;

        socket.on('connect', () => {
            term.write('Connected to terminal server...\r\n');
        });

        socket.on('session_id', (data) => {
            sessionId = data.id;
            term.write('Starting container...\r\n');
            socket.emit('start_session', { id: sessionId });
        });

        socket.on('container_ready', () => {
            term.write('Container ready!\r\n\r\n');
        });

        socket.on('output', (data) => {
            term.write(data.output);
        });

        socket.on('error', (data) => {
            term.write('\r\nError: ' + data.error + '\r\n');
        });

        term.onData((data) => {
            if (sessionId) {
                socket.emit('input', {
                    id: sessionId,
                    input: data
                });
            }
        });

        window.addEventListener('beforeunload', () => {
            if (sessionId) {
                socket.emit('cleanup', { id: sessionId });
            }
        });
    </script>
</body>
</html>
