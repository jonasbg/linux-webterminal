<!DOCTYPE html>
<html>
<head>
    <title>Interactive Terminal</title>
    <!-- Add favicon links -->
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/img/apple-touch-icon.png">
    <!-- Add OpenGraph tags right after title -->
    <meta property="og:title" content="Web Terminal" />
    <meta property="og:description" content="An interactive web-based terminal environment" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="htts://jonas.grimsgaard.dev" /> <!-- Add your deployment URL here -->
    <meta property="og:image" content="/static/img/og_image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Web Terminal" />
    <!-- Add Twitter Card tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Web Terminal" />
    <meta name="twitter:description" content="An interactive web-based terminal environment" />
    <meta name="twitter:image" content="/static/img/og_image.png" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.5.0/xterm.min.css" integrity="sha512-XpXUuzg5afNt1bsgnrOesXP70TLH8tXYYK5sK+Y0UV+YBvJn9EfRFYWy4HT3TVDfH0nl1CO0lwOxIrt2gk9qjg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.5.0/xterm.js" integrity="sha512-Gujw5GajF5is3nMoGv9X+tCMqePLL/60qvAv1LofUZTV9jK8ENbM9L+maGmOsNzuZaiuyc/fpph1KT9uR5w3CQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.js" integrity="sha512-8BHxHDLsOHx+flIrQ0DrZcea7MkHqRU5GbTHmbdzMRnAaoCIkZ97PqZcXJkKZckMMhqfoeaJE+DNUVuyoQsO3Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- Replace the Fira Code link with this -->
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0px;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
        }
        #terminal {
            width: 100vw;
            height: 90vh;
            padding: 20px;
            border-radius: 15px;
            background-color: #000;
            overflow: hidden;
            position: relative; /* Add this */
        }
        .terminal-container {
            width: 100%;
            height: 100%;
            position: relative; /* Add this */
        }
        /* Xterm specific styles */
        .xterm {
            padding: 0;
            margin: 0;
            position: absolute; /* Change to absolute */
            width: 100% !important;
            height: 100% !important;
        }
        .xterm-viewport {
            width: 100% !important;
            height: 100% !important;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .xterm-screen {
            width: 100% !important;
            height: 100% !important;
            position: relative; /* Add this */
        }
        /* Add these new styles */
        .xterm-scroll-area {
            visibility: hidden;
        }
        .xterm-char-measure-element {
            visibility: hidden;
        }
        /* Ensure proper font loading */
        @supports (font-variation-settings: normal) {
            .xterm-viewport {
                font-family: 'Fira Code VF', monospace;
            }
        }
    </style>
</head>
<body>
    <div id="motd-container"></div>
    <div id="terminal"></div>

    <script>

        fetch('/static/motd.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('motd-container').innerHTML = html;
            });

        const fitAddon = new FitAddon.FitAddon();

        const term = new Terminal({
            cursorBlink: true,
            fontSize: 14,
            fontFamily: '"Ubuntu Mono", monospace',
            theme: {
                background: '#000000',
                foreground: '#ffffff'
            },
            convertEol: true,
            scrollback: 1000,
            cols: 142,
            rows: 24,
            cursorStyle: 'block',
            fastScrollModifier: 'alt',
            scrollSensitivity: 1,
            macOptionIsMeta: true,
            allowTransparency: false,
            letterSpacing: 0,
            lineHeight: 1,
            fontLigatures: false  // Ubuntu Mono doesn't support ligatures
        });

        term.loadAddon(fitAddon);

        function dismissDialog() {
            const dialog = document.getElementById('motd-dialog');
            if (dialog) {
                dialog.classList.add('hidden');
                term?.focus();
            }
        }

        let sessionId = null;

        function fitTerminal() {
            const terminal = document.getElementById('terminal');
            const computedStyle = window.getComputedStyle(terminal);
            const width = parseInt(computedStyle.getPropertyValue('width'));
            const height = parseInt(computedStyle.getPropertyValue('height'));
            const fontSize = 14;

            const cols = Math.floor(width / (fontSize * 0.5));
            const rows = Math.floor(height / (fontSize * 1.2));

            term.resize(cols, rows);
            fitAddon.fit();

            // Send dimensions to server
            if (sessionId) {
                socket.emit('resize', {
                    id: sessionId,
                    cols: cols
                });
            }
        }

        term.open(document.getElementById('terminal'));

        window.addEventListener('resize', () => {
            clearTimeout(window.resizeTimeout);
            window.resizeTimeout = setTimeout(fitTerminal, 250);
        });

        const socket = io(window.location.origin, {
            transports: ['websocket'],
            reconnectionAttempts: 5,
            reconnectionDelay: 1000
        });

        socket.on('connect', () => {
            term.write('Connected to terminal server...\r\n');
        });

        socket.on('session_id', (data) => {
            sessionId = data.id;
            term.write('Starting container...\r\n');
            socket.emit('start_session', { id: sessionId });
            setTimeout(() => {
                fitTerminal();
            }, 1000);
        });

        socket.on('container_ready', () => {
            term.write('Container ready!\r\n\r\n');
        });

        socket.on('output', (data) => {
            term.write(data.output);
        });

        socket.on('error', (data) => {
            term.write('\r\nError: ' + data.error + '\r\n');
        });

        term.onData((data) => {
            if (sessionId) {
                socket.emit('input', {
                    id: sessionId,
                    input: data
                });
            }
        });

        window.addEventListener('beforeunload', () => {
            if (sessionId) {
                socket.emit('cleanup', { id: sessionId });
            }
        });
    </script>
</body>
</html>
