services:
  terminal-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: terminal-server
    command: ["gunicorn", "--workers", "4", "-k", "eventlet", "--bind", "0.0.0.0:5000", "app:app", "--reload"]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - /run/user/1000/podman/podman.sock:/var/run/docker.sock:ro
      - ./logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    environment:
      - HOST=shell.nhn.one
      - TTY_LOGGING_ENABLED=true
      - MAX_CONTAINERS=50
      - CONTAINER_LIFETIME=10800
    ports:
      - "5001:5000"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
